          CONFIG_PACKAGE_luci-app-pppoe-relay=y
          CONFIG_PACKAGE_luci-app-privoxy=y
          CONFIG_PACKAGE_luci-app-qos=y
          CONFIG_PACKAGE_luci-app-ramfree=y
          CONFIG_PACKAGE_luci-app-ssr-plus=y
          CONFIG_PACKAGE_luci-app-rclone_INCLUDE_rclone-webui=y
          CONFIG_PACKAGE_luci-app-rclone_INCLUDE_rclone-ng=y
          CONFIG_PACKAGE_luci-app-samba=y
          CONFIG_PACKAGE_luci-app-shadowsocks-libev=y
          CONFIG_PACKAGE_luci-app-ssrserver-python=y
          CONFIG_PACKAGE_luci-app-statistics=y
          CONFIG_PACKAGE_luci-app-ttyd=y
          CONFIG_PACKAGE_luci-app-unblockmusic=y
          CONFIG_UnblockNeteaseMusic_Go=y
          CONFIG_UnblockNeteaseMusic_NodeJS=y
          CONFIG_PACKAGE_luci-app-upnp=y
          CONFIG_PACKAGE_luci-app-vlmcsd=y
          CONFIG_PACKAGE_luci-app-webadmin=y
          CONFIG_PACKAGE_luci-proto-bonding=y
          CONFIG_PACKAGE_luci-app-poweroff=y
          # 4. Themes
          CONFIG_PACKAGE_luci-theme-argon=y
          CONFIG_PACKAGE_luci-theme-bootstrap=y
          CONFIG_PACKAGE_luci-theme-freifunk-generic=y
          CONFIG_PACKAGE_luci-theme-material=y
          CONFIG_PACKAGE_luci-theme-netgear=y
          CONFIG_PACKAGE_luci-theme-opentomcat=y
          # 5. Protocols
          CONFIG_PACKAGE_luci-proto-bonding=y
          CONFIG_PACKAGE_luci-proto-ipv6=y
          CONFIG_PACKAGE_luci-proto-ppp=y
          # 6. Libraries
          CONFIG_PACKAGE_luci-lib-ip=y
          CONFIG_PACKAGE_luci-lib-jsonc=y
          CONFIG_PACKAGE_luci-lib-nixio=y
          # end of 6. Libraries
          # 9. Freifunk
          # end of 9. Freifunk
          # 语言
          CONFIG_PACKAGE_default-settings=y
          CONFIG_PACKAGE_luci-i18n-accesscontrol-zh-cn=y
          CONFIG_PACKAGE_luci-i18n-adbyby-plus-zh-cn=y
          CONFIG_PACKAGE_luci-i18n-autoreboot-zh-cn=y
          CONFIG_PACKAGE_luci-i18n-base-zh-cn=y
          CONFIG_PACKAGE_luci-i18n-filetransfer-zh-cn=y
          CONFIG_PACKAGE_luci-i18n-firewall-zh-cn=y
          CONFIG_PACKAGE_luci-i18n-ipsec-vpnd-zh-cn=y
          CONFIG_PACKAGE_luci-i18n-netdata-zh-cn=y
          CONFIG_PACKAGE_luci-i18n-nlbwmon-zh-cn=y
          CONFIG_PACKAGE_luci-i18n-ntpc-zh-cn=y
          CONFIG_PACKAGE_luci-i18n-pppoe-relay-zh-cn=y
          CONFIG_PACKAGE_luci-i18n-privoxy-zh-cn=y
          CONFIG_PACKAGE_luci-i18n-qos-zh-cn=y
          CONFIG_PACKAGE_luci-i18n-ramfree-zh-cn=y
          CONFIG_PACKAGE_luci-i18n-samba-zh-cn=y
          CONFIG_PACKAGE_luci-i18n-sfe-zh-cn=y
          CONFIG_PACKAGE_luci-i18n-statistics-zh-cn=y
          CONFIG_PACKAGE_luci-i18n-ttyd-zh-cn=y
          CONFIG_PACKAGE_luci-i18n-unblockmusic-zh-cn=y
          CONFIG_PACKAGE_luci-i18n-upnp-zh-cn=y
          CONFIG_PACKAGE_luci-i18n-vlmcsd-zh-cn=y
          CONFIG_PACKAGE_luci-i18n-webadmin-zh-cn=y
          CONFIG_PACKAGE_luci-i18n-chinese=y
          # end of 9. Freifunk
          CONFIG_DEFAULT_mkf2fs=y
          CONFIG_DEFAULT_mtd=y
          CONFIG_DEFAULT_netifd=y
          CONFIG_DEFAULT_opkg=y
          CONFIG_DEFAULT_partx-utils=y
          CONFIG_DEFAULT_ppp=y
          CONFIG_DEFAULT_ppp-mod-pppoe=y
          CONFIG_DEFAULT_uci=y
          CONFIG_DEFAULT_uclient-fetch=y
          CONFIG_DEFAULT_urandom-seed=y
          CONFIG_DEFAULT_urngd=y
          CONFIG_DEFAULT_wget=y
          CONFIG_DEFAULT_wpad=y
          CONFIG_HAS_TESTING_KERNEL=y
          CONFIG_HAS_FPU=y
          CONFIG_AUDIO_SUPPORT=y
          CONFIG_GPIO_SUPPORT=y
          CONFIG_PCI_SUPPORT=y
          CONFIG_PCIE_SUPPORT=y
          CONFIG_PCMCIA_SUPPORT=y
          CONFIG_USB_SUPPORT=y
          CONFIG_RTC_SUPPORT=y
          CONFIG_USES_SQUASHFS=y
          CONFIG_ARCH_64BIT=y
          CONFIG_VIRTIO_SUPPORT=y
          CONFIG_USES_ROOTFS_PART=y
          CONFIG_USES_BOOT_PART=y
          CONFIG_x86_64=y
          CONFIG_ARCH="x86_64"
          # 新增 Target Images
          CONFIG_EXTERNAL_CPIO=""
          # 新增 Root filesystem images
          CONFIG_TARGET_ROOTFS_SQUASHFS=y
          CONFIG_TARGET_SQUASHFS_BLOCK_SIZE=256
          CONFIG_TARGET_UBIFS_FREE_SPACE_FIXUP=y
          CONFIG_TARGET_UBIFS_JOURNAL_SIZE=""
          CONFIG_GRUB_IMAGES=y
          CONFIG_GRUB_CONSOLE=y
          CONFIG_GRUB_SERIAL="ttyS0"
          CONFIG_GRUB_BAUDRATE=115200
          CONFIG_GRUB_BOOTOPTS=""
          CONFIG_GRUB_TIMEOUT="0"
          CONFIG_GRUB_TITLE="OpenWrt"
          CONFIG_VMDK_IMAGES=y
          # 新增 Image Options
          CONFIG_TARGET_KERNEL_PARTSIZE=256
          CONFIG_TARGET_ROOTFS_PARTSIZE=512
          CONFIG_TARGET_ROOTFS_PARTNAME="" 
          # 新增 Global build settings
          CONFIG_ALL_KMODS=y
          CONFIG_SIGNED_PACKAGES=y
          CONFIG_SIGNATURE_CHECK=y
          # 新增 General build options
          CONFIG_DISPLAY_SUPPORT=y
          CONFIG_SHADOW_PASSWORDS=y
          # 新增 Kernel build options
          CONFIG_KERNEL_BUILD_USER=""
          CONFIG_KERNEL_BUILD_DOMAIN=""
          CONFIG_KERNEL_PRINTK=y
          CONFIG_KERNEL_SWAP=y
          CONFIG_KERNEL_DEBUG_FS=y
          CONFIG_KERNEL_KALLSYMS=y
          CONFIG_KERNEL_DEBUG_KERNEL=y
          CONFIG_KERNEL_DEBUG_INFO=y
          CONFIG_KERNEL_AIO=y
          CONFIG_KERNEL_FHANDLE=y
          CONFIG_KERNEL_FANOTIFY=y
          CONFIG_KERNEL_MAGIC_SYSRQ=y
          CONFIG_KERNEL_COREDUMP=y
          CONFIG_KERNEL_ELF_CORE=y
          CONFIG_KERNEL_PRINTK_TIME=y
          CONFIG_KERNEL_KEXEC=y
          CONFIG_KERNEL_PROC_VMCORE=y
          CONFIG_KERNEL_PROC_KCORE=y
          CONFIG_KERNEL_CRASH_DUMP=y
          CONFIG_KERNEL_CGROUPS=y
          CONFIG_KERNEL_FREEZER=y
          CONFIG_KERNEL_CGROUP_FREEZER=y
          CONFIG_KERNEL_CGROUP_DEVICE=y
          CONFIG_KERNEL_CGROUP_PIDS=y
          CONFIG_KERNEL_CPUSETS=y
          CONFIG_KERNEL_CGROUP_CPUACCT=y
          CONFIG_KERNEL_RESOURCE_COUNTERS=y
          CONFIG_KERNEL_MM_OWNER=y
          CONFIG_KERNEL_MEMCG=y
          CONFIG_KERNEL_MEMCG_KMEM=y
          CONFIG_KERNEL_CGROUP_SCHED=y
          CONFIG_KERNEL_FAIR_GROUP_SCHED=y
          CONFIG_KERNEL_RT_GROUP_SCHED=y
          CONFIG_KERNEL_BLK_CGROUP=y
          CONFIG_KERNEL_NET_CLS_CGROUP=y
          CONFIG_KERNEL_CGROUP_NET_PRIO=y
          CONFIG_KERNEL_NAMESPACES=y
          CONFIG_KERNEL_UTS_NS=y
          CONFIG_KERNEL_IPC_NS=y
          CONFIG_KERNEL_USER_NS=y
          CONFIG_KERNEL_PID_NS=y
          CONFIG_KERNEL_NET_NS=y
          CONFIG_KERNEL_DEVPTS_MULTIPLE_INSTANCES=y
          CONFIG_KERNEL_POSIX_MQUEUE=y
          CONFIG_KERNEL_SECCOMP_FILTER=y
          CONFIG_KERNEL_SECCOMP=y
          CONFIG_KERNEL_IP_MROUTE=y
          CONFIG_KERNEL_IPV6=y
          CONFIG_KERNEL_IPV6_MULTIPLE_TABLES=y
          CONFIG_KERNEL_IPV6_SUBTREES=y
          CONFIG_KERNEL_IPV6_MROUTE=y
          CONFIG_KERNEL_SQUASHFS_FRAGMENT_CACHE_SIZE=3
          CONFIG_KERNEL_CC_OPTIMIZE_FOR_PERFORMANCE=y
          # 新增 Stripping options
          CONFIG_USE_SSTRIP=y
          CONFIG_USE_UCLIBCXX=y
          # 新增 Hardening build options
          CONFIG_PKG_CHECK_FORMAT_SECURITY=y
          CONFIG_PKG_ASLR_PIE_REGULAR=y
          CONFIG_PKG_CC_STACKPROTECTOR_REGULAR=y
          CONFIG_KERNEL_CC_STACKPROTECTOR_REGULAR=y
          CONFIG_KERNEL_STACKPROTECTOR=y
          CONFIG_PKG_FORTIFY_SOURCE_1=y
          CONFIG_PKG_RELRO_FULL=y
          # 新增 
          CONFIG_BINARY_FOLDER=""
          CONFIG_DOWNLOAD_FOLDER=""
          CONFIG_LOCALMIRROR=""
          CONFIG_AUTOREBUILD=y
          CONFIG_BUILD_SUFFIX=""
          CONFIG_TARGET_ROOTFS_DIR=""
          CONFIG_EXTERNAL_KERNEL_TREE=""
          CONFIG_KERNEL_GIT_CLONE_URI=""
          CONFIG_BUILD_LOG_DIR=""
          CONFIG_EXTRA_OPTIMIZATION="-fno-caller-saves -fno-plt"
          CONFIG_TARGET_OPTIMIZATION="-Os -pipe"
          CONFIG_EXTRA_BINUTILS_CONFIG_OPTIONS=""
          CONFIG_EXTRA_GCC_CONFIG_OPTIONS=""
          CONFIG_NASM=y
          CONFIG_GDB=y
          CONFIG_USE_MUSL=y
          CONFIG_SSP_SUPPORT=y
          CONFIG_BINUTILS_VERSION_2_31_1=y
          CONFIG_BINUTILS_VERSION="2.31.1"
          CONFIG_GCC_VERSION="8.4.0"
          CONFIG_LIBC="musl"
          CONFIG_TARGET_SUFFIX="musl"
          CONFIG_TARGET_PREINIT_SUPPRESS_STDERR=y
          CONFIG_TARGET_PREINIT_TIMEOUT=2
          CONFIG_TARGET_PREINIT_IFNAME=""
          CONFIG_TARGET_PREINIT_IP="192.168.1.1"
          CONFIG_TARGET_PREINIT_NETMASK="255.255.255.0"
          CONFIG_TARGET_PREINIT_BROADCAST="192.168.1.255"
          CONFIG_TARGET_INIT_PATH="/usr/sbin:/usr/bin:/sbin:/bin"
          CONFIG_TARGET_INIT_ENV=""
          CONFIG_TARGET_INIT_CMD="/sbin/init"
          CONFIG_TARGET_INIT_SUPPRESS_STDERR=y
          CONFIG_PER_FEED_REPO=y
          CONFIG_FEED_packages=y
          CONFIG_FEED_luci=y
          CONFIG_FEED_routing=y
          CONFIG_FEED_telephony=y
          CONFIG_FEED_freifunk=y
          EOF

          #
          # ===============================================================
          # 

          sed -i 's/^[ \t]*//g' ./.config
          make defconfig

      - name: Make download
        run: |
          make download -j8 || make download -j1 V=s
          rm -rf $(find ./dl/ -size -1024c)
          df -h

      - name: Compile firmware
        run: |
          make -j$(nproc) || make -j1 V=s
          echo "======================="
          echo "Space usage:"
          echo "======================="
          df -h
          echo "======================="
          du -h ./ --max-depth=1
          du -h /mnt/openwrt/ --max-depth=1 || true

      - name: Prepare artifact
        run: |
          mkdir -p ./artifact/firmware
          mkdir -p ./artifact/package
          mkdir -p ./artifact/buildinfo
          rm -rf $(find ./bin/targets/ -type d -name "packages")
          cp -rf $(find ./bin/targets/ -type f) ./artifact/firmware/
          cp -rf $(find ./bin/packages/ -type f -name "*.ipk") ./artifact/package/
          cp -rf $(find ./bin/targets/ -type f -name "*.buildinfo" -o -name "*.manifest") ./artifact/buildinfo/

      - name: Deliver buildinfo
        uses: actions/upload-artifact@v2
        with:
          name: OpenWrt_buildinfo
          path: ./artifact/buildinfo/

      - name: Deliver package
        uses: actions/upload-artifact@v2
        with:
          name: OpenWrt_package
          path: ./artifact/package/

      - name: Deliver firmware
        uses: actions/upload-artifact@v2
        with:
          name: OpenWrt_firmware
          path: ./bin/targets/

      - name: Upload release asset
        if: github.event == 'release'
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.YOURTOKEN }}
          file: ./artifact/firmware/*
          tag: ${{ github.ref }}
          file_glob: true
